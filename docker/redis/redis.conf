# 绑定所有（由 Docker 网络控制访问）
bind 0.0.0.0

# 保护模式（Docker 内可关闭）
protected-mode no

# 端口
port 6379

# 后台运行关闭（Docker 必须前台）
daemonize no

# 密码（由 entrypoint 注入）
requirepass ${REDIS_PASSWORD}

# 持久化（开启 AOF）
appendonly yes
appendfsync everysec

# RDB 也保留
save 900 1
save 300 10
save 60 10000

# 最大内存（示例 256mb）
maxmemory 256mb
maxmemory-policy allkeys-lru

# TCP 优化
tcp-keepalive 300
timeout 0

# 日志
loglevel notice

# 禁止危险命令
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command CONFIG ""
rename-command SHUTDOWN ""
rename-command DEBUG ""