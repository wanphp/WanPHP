; ========= 基础配置 =========
date.timezone = Asia/Shanghai
expose_php = Off               ; 隐藏 PHP 版本信息

; ========= 错误处理 =========
display_errors = Off           ; 生产环境禁用错误输出
log_errors = On
error_log = /var/log/php/php-error.log

; ========= 资源限制 =========
memory_limit = 512M            ; 内存上限（普通请求足够，复杂任务也能支撑）
max_execution_time = 120       ; 单次请求最大执行时间 (秒)
max_input_time = 60            ; POST/GET 输入解析超时 (秒)
default_socket_timeout = 30    ; 网络请求默认超时 (秒)

; ========= 上传相关 =========
file_uploads = On
upload_max_filesize = 20M
post_max_size = 25M            ; 必须大于 upload_max_filesize

; ========= 安全优化 =========
allow_url_fopen = Off          ; 关闭远程文件访问，防止 SSRF
allow_url_include = Off        ; 禁止 include 远程文件
clear_env = yes

; ========= 会话 =========
session.gc_maxlifetime = 1440  ; session 有效期（秒，默认 24 分钟）
session.use_strict_mode = 1    ; 防止 session fixation

; ========= 性能 =========
realpath_cache_size = 4096k    ; 提升文件查找性能
realpath_cache_ttl = 600

; ========= OPcache (如果启用 PHP OPcache) =========
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.revalidate_freq = 0
opcache.fast_shutdown = 1

opcache.max_wasted_percentage=5
opcache.use_cwd=1

opcache.validate_timestamps=0

