# 微信公众号图片（mmbiz）
location ~ ^/(?:.*_)?mmbiz_.*|^/mmbiz/ {

    # 防盗链
    if ($valid_referer_custom = 0) {
        return 404;
    }

    proxy_pass https://mmbiz.qpic.cn;
    proxy_set_header Host mmbiz.qpic.cn;

    # 关键：模拟正常浏览器（防微信拦）
    proxy_set_header Referer "https://mp.weixin.qq.com/";
    proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120 Safari/537.36";

    # 超时
    proxy_connect_timeout 5s;
    proxy_read_timeout 10s;

    # 本地缓存（核心）
    proxy_cache wechat_cache;
    proxy_cache_key "$request_uri";

    proxy_cache_valid 200 301 302 365d;
    proxy_cache_valid 404 1m;

    # 防止缓存击穿（关键）
    proxy_cache_lock on;
    proxy_cache_lock_timeout 5s;

    # 微信挂了也能顶
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

    # 后台更新
    proxy_cache_background_update on;

    # 减少回源
    proxy_ignore_headers Set-Cookie;

    # 浏览器缓存
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable";
}

# 微信头像（qlogo）
location ^~ /mmopen/ {

    if ($valid_referer_custom = 0) {
        return 404;
    }

    proxy_pass https://wx.qlogo.cn;
    proxy_set_header Host wx.qlogo.cn;

    proxy_set_header Referer "https://mp.weixin.qq.com/";
    proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120 Safari/537.36";

    proxy_cache wechat_cache;
    proxy_cache_valid 200 30d;

    proxy_cache_lock on;
    proxy_cache_use_stale error timeout updating;

    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
}