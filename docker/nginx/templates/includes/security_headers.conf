# 强制 HTTPS
more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains" always;

# 基础安全防护
more_set_headers "X-Content-Type-Options: nosniff" always;
more_set_headers "X-Frame-Options: SAMEORIGIN" always;
more_set_headers "Referrer-Policy: strict-origin-when-cross-origin" always;

# 跨域隔离
more_set_headers "Cross-Origin-Opener-Policy: same-origin" always;
more_set_headers "Cross-Origin-Embedder-Policy: credentialless" always;

# 隐私权限控制
more_set_headers "Permissions-Policy: geolocation=(),camera=(),microphone=(),payment=(),usb=()" always;

# 内容安全策略 (CSP)，如果页面有引用第三方视频或统计，记得在 script-src 和 img-src 里增加域名
more_set_headers "Content-Security-Policy: default-src 'self'; script-src 'self' https: 'unsafe-inline' 'unsafe-eval'; style-src 'self' https: 'unsafe-inline'; img-src 'self' https: data:; font-src 'self' https: data:; connect-src 'self' https:; frame-src 'self' https:; object-src 'none'; base-uri 'self';" always;

# 链路追踪 ID
proxy_set_header X-Request-Id $request_id;