# ===== 安全响应头 =====
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Embedder-Policy "credentialless" always;

add_header Permissions-Policy "geolocation=(),camera=(),microphone=(),payment=(),usb=()" always;
add_header Content-Security-Policy "default-src 'self';script-src 'self' https: 'unsafe-inline' 'unsafe-eval';style-src 'self' https: 'unsafe-inline';img-src 'self' https: data:;font-src 'self' https: data:;connect-src 'self' https:;frame-src 'self' https:;object-src 'none';base-uri 'self';" always;
#
proxy_set_header X-Request-Id $audit_req_id;
